<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Bus Assignments Table</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    table {
      table-layout: fixed;
      width: 100%;
    }
    th, td {
      word-wrap: break-word;
      text-align: center;
      font-size: 25px;
      padding: 0px;
      line-height: 1;
      height: 25px;
    }
    th {
      background-color: #007bff;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h2 class="text-center">Admin - Bus Assignments</h2>

    <div id="loginForm">
      <div class="d-flex justify-content-center align-items-center flex-column">
        <h3>Login</h3>
        <form>
          <div class="form-group">
            <label>Email address</label>
            <input type="email" class="form-control" id="email" placeholder="Enter email">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-control" id="password" placeholder="Password">
          </div>
          <button type="button" class="btn btn-primary" onclick="signIn()">Login</button>
        </form>
        <div id="loginMessage" class="mt-3"></div>
      </div>
    </div>

    <div id="adminContent" style="display:none;">
      <table class="table table-bordered table-responsive-sm mt-3">
        <thead>
          <tr>
            <th>Bus#</th>
            <th>Assigned Route</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>

      <button class="btn btn-primary" onclick="saveTable()">Save</button>
      <button class="btn btn-danger mt-3" onclick="signOut()">Logout</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut as firebaseSignOut } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCaouI0BOGsEEGK8RleByMEeLoRsvu2nLw",
      authDomain: "busassignments-6d239.firebaseapp.com",
      databaseURL: "https://busassignments-6d239-default-rtdb.firebaseio.com",
      projectId: "busassignments-6d239",
      storageBucket: "busassignments-6d239.appspot.com",
      messagingSenderId: "451720299964",
      appId: "1:451720299964:web:34637403021a3dc9a5d7b9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ✅ BUS LIST (UPDATED)
    const preWrittenSentences1 = [
      "57-Eldorado",
      "59-NOVA",
      "60-Eldorado",
      "61-Eldorado",
      "63-NewFlyer",
      "65-Eldorado",
      "66-Eldorado",
      "67-Eldorado",
      "71-NewFlyer",
      "74-NewFlyer",
      "75-NOVA",
      "76-NOVA",
      "77-NOVA",
      "78-NOVA",
      "79-NOVA"
    ];

    const preWrittenSentences2 = [
      "Wolfville 1",
      "Wolfville 2",
      "Greenwood 1",
      "Greenwood 2",
      "Bridgetown",
      "Cornwallis",
      "Weymouth",
      "OOS",
      "SPARE",
      "SPARE-Core",
      "SPARE-Bridgetown",
      "SPARE-Weymouth"
    ];

    window.signIn = function () {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          document.getElementById('loginForm').style.display = "none";
          document.getElementById('adminContent').style.display = 'block';
          populateTable();
        })
        .catch((error) => {
          document.getElementById('loginMessage').textContent = error.message;
        });
    };

    window.signOut = function () {
      firebaseSignOut(auth).then(() => {
        document.getElementById('adminContent').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
      });
    };

    function populateTable() {
      const dbRef = ref(db, 'busAssignments');

      get(dbRef).then((snapshot) => {
        const data = snapshot.exists() ? snapshot.val() : [];
        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = '';

        for (let i = 0; i < preWrittenSentences1.length; i++) {

          // ✅ THIS IS THE FIX
          const rowData = data[i] || {
            col1: preWrittenSentences1[i],
            col2: "",
            col3: ""
          };

          const newRow = document.createElement('tr');
          newRow.innerHTML = `
            <td>
              <select class="form-control">
                ${preWrittenSentences1.map(sentence =>
                  `<option ${sentence === rowData.col1 ? 'selected' : ''}>${sentence}</option>`
                ).join('')}
              </select>
            </td>
            <td>
              <select class="form-control">
                ${preWrittenSentences2.map(sentence =>
                  `<option ${sentence === rowData.col2 ? 'selected' : ''}>${sentence}</option>`
                ).join('')}
              </select>
            </td>
            <td contenteditable="true">${rowData.col3 || ""}</td>
          `;

          tableBody.appendChild(newRow);
        }
      }).catch(() => {
        createEmptyTable();
      });
    }

    function createEmptyTable() {
      const tableBody = document.getElementById('table-body');
      tableBody.innerHTML = '';

      for (let i = 0; i < preWrittenSentences1.length; i++) {
        const newRow = document.createElement('tr');
        newRow.innerHTML = `
          <td>
            <select class="form-control">
              ${preWrittenSentences1.map(s => `<option>${s}</option>`).join('')}
            </select>
          </td>
          <td>
            <select class="form-control">
              ${preWrittenSentences2.map(s => `<option>${s}</option>`).join('')}
            </select>
          </td>
          <td contenteditable="true"></td>
        `;
        tableBody.appendChild(newRow);
      }
    }

    window.saveTable = function () {
      const rows = document.querySelectorAll('#table-body tr');
      const tableData = [];

      rows.forEach(row => {
        const cells = row.getElementsByTagName('td');
        tableData.push({
          col1: cells[0].querySelector('select').value,
          col2: cells[1].querySelector('select').value,
          col3: cells[2].innerText
        });
      });

      set(ref(db, 'busAssignments'), tableData)
        .then(() => console.log('Saved'))
        .catch(err => console.error(err));
    };
  </script>
</body>
</html>
