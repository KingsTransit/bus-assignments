<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Bus Assignments Table</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    table {
      table-layout: fixed;
      width: 100%;
    }
    th, td {
      word-wrap: break-word;
      text-align: center;
      font-size: 25px;
      padding: 0px;
      line-height: 1;
      height: 25px;
    }
    th {
      background-color: #007bff;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h2 class="text-center">Admin - Bus Assignments</h2>

    <div id="loginForm">
      <div class="d-flex justify-content-center align-items-center flex-column">
        <h3>Login</h3>
        <form>
          <input type="email" class="form-control mb-2" id="email" placeholder="Email">
          <input type="password" class="form-control mb-2" id="password" placeholder="Password">
          <button type="button" class="btn btn-primary" onclick="signIn()">Login</button>
        </form>
        <div id="loginMessage"></div>
      </div>
    </div>

    <div id="adminContent" style="display:none;">
      <table class="table table-bordered mt-3">
        <thead>
          <tr>
            <th>Bus#</th>
            <th>Assigned Route</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>

      <button class="btn btn-primary" onclick="saveTable()">Save</button>
      <button class="btn btn-danger mt-3" onclick="signOut()">Logout</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut as firebaseSignOut } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCaouI0BOGsEEGK8RleByMEeLoRsvu2nLw",
      authDomain: "busassignments-6d239.firebaseapp.com",
      databaseURL: "https://busassignments-6d239-default-rtdb.firebaseio.com",
      projectId: "busassignments-6d239",
      storageBucket: "busassignments-6d239.appspot.com",
      messagingSenderId: "451720299964",
      appId: "1:451720299964:web:34637403021a3dc9a5d7b9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const preWrittenSentences1 = [
      "57-Eldorado","59-NOVA","60-Eldorado","61-Eldorado",
      "63-NewFlyer","65-Eldorado","66-Eldorado","67-Eldorado",
      "71-NewFlyer","74-NewFlyer",
      "75-NOVA","76-NOVA","77-NOVA","78-NOVA","79-NOVA"
    ];

    const preWrittenSentences2 = [
      "Wolfville 1","Wolfville 2","Greenwood 1","Greenwood 2",
      "Bridgetown","Cornwallis","Weymouth",
      "OOS","SPARE","SPARE-Core","SPARE-Bridgetown","SPARE-Weymouth"
    ];

    window.signIn = function () {
      signInWithEmailAndPassword(auth,
        document.getElementById('email').value,
        document.getElementById('password').value
      ).then(() => {
        document.getElementById('loginForm').style.display = "none";
        document.getElementById('adminContent').style.display = 'block';
        populateTable();
      }).catch(e => {
        document.getElementById('loginMessage').textContent = e.message;
      });
    };

    window.signOut = function () {
      firebaseSignOut(auth).then(() => {
        document.getElementById('adminContent').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
      });
    };

    function populateTable() {
      get(ref(db, 'busAssignments')).then(snapshot => {
        const data = snapshot.exists() ? snapshot.val() : [];
        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = '';

        for (let i = 0; i < preWrittenSentences1.length; i++) {
          const rowData = data[i] || { col1: "", col2: "", col3: "" };

          const row = document.createElement('tr');
          row.innerHTML = `
            <td>
              <select class="form-control">
                <option value="">--</option>
                ${preWrittenSentences1.map(b =>
                  `<option ${b===rowData.col1?'selected':''}>${b}</option>`
                ).join('')}
              </select>
            </td>
            <td>
              <select class="form-control">
                <option value="">--</option>
                ${preWrittenSentences2.map(r =>
                  `<option ${r===rowData.col2?'selected':''}>${r}</option>`
                ).join('')}
              </select>
            </td>
            <td contenteditable="true">${rowData.col3 || ""}</td>
          `;
          tableBody.appendChild(row);
        }
      });
    }

    window.saveTable = function () {
      const rows = document.querySelectorAll('#table-body tr');
      const data = [];

      rows.forEach(r => {
        const tds = r.getElementsByTagName('td');
        const bus = tds[0].querySelector('select').value;

        // ✅ ONLY SAVE IF BUS SELECTED
        if (bus !== "") {
          data.push({
            col1: bus,
            col2: tds[1].querySelector('select').value,
            col3: tds[2].innerText
          });
        }
      });

      // Save to Firebase with confirmation prompt
      set(ref(db, 'busAssignments'), data)
        .then(() => {
          alert("Bus assignments have been successfully updated!");
        })
        .catch((error) => {
          alert("Error saving data: " + error.message);
        });
    };
  </script>
</body>
</html>
