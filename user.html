<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User - Bus Assignments Table</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    .table-container {
      margin-top: 150px; /* leave space for logo/header */
    }

    table {
      table-layout: fixed;
      width: 100%;
    }
    th, td {
      word-wrap: break-word;
      text-align: center;
      font-weight: bold;
      padding: 5px;
      line-height: 1.2;
    }
    th {
      background-color: #007bff;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    .red-text {
      color: red;
    }

    .header-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-top: 20px;
      padding: 0 15px;
    }

    .header-container h2 {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
    }

    .header-container #datetime {
      margin: 0;
      font-size: 20px;
      font-weight: bold;
      text-decoration: underline;
    }

    img.logo {
      position: absolute;
      top: 10px;
      left: 20px;
      width: 120px;
      height: auto;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .header-container h2 {
        font-size: 22px;
        text-align: center;
        width: 100%;
      }
      .header-container #datetime {
        font-size: 16px;
        text-align: center;
        width: 100%;
        margin-top: 5px;
      }
      th, td {
        font-size: 14px;
        padding: 3px;
      }
    }
  </style>
</head>
<body>
  <img src="https://kingstransit.github.io/bus-assignments/header-logo-120.png" alt="Company Logo" class="logo">

  <div class="container table-container">
    <div class="header-container">
      <h2 class="text-center">Bus Assignments</h2>
      <div id="datetime"></div>
    </div>

    <div id="userContent" class="mt-3">
      <div class="table-responsive">
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>Bus#</th>
              <th>Assigned Route</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Table rows populated dynamically -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-database.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCaouI0BOGsEEGK8RleByMEeLoRsvu2nLw",
      authDomain: "busassignments-6d239.firebaseapp.com",
      databaseURL: "https://busassignments-6d239-default-rtdb.firebaseio.com",
      projectId: "busassignments-6d239",
      storageBucket: "busassignments-6d239.appspot.com",
      messagingSenderId: "451720299964",
      appId: "1:451720299964:web:34637403021a3dc9a5d7b9",
      measurementId: "G-4J3KXJD2BC"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);

    function populateTable() {
      const tableBody = document.getElementById('table-body');
      const dbRef = ref(db, 'busAssignments');

      get(dbRef).then((snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          tableBody.innerHTML = '';

          const entries = Array.isArray(data) ? data : Object.values(data);

          entries.forEach((rowData) => {
            if (!rowData.col1 || rowData.col1.trim() === "") return;
            if (!rowData.col2 || rowData.col2.trim() === "") return;

            const futureBuses = ["75-NOVA","76-NOVA","77-NOVA","79-NOVA"];
            if (futureBuses.includes(rowData.col1)) return;

            const newRow = document.createElement('tr');
            if (rowData.col2 === 'OOS') newRow.classList.add('red-text');

            newRow.innerHTML = `
              <td>${rowData.col1}</td>
              <td>${rowData.col2}</td>
              <td>${rowData.col3 || ""}</td>
            `;
            tableBody.appendChild(newRow);
          });

          if (!tableBody.hasChildNodes()) {
            tableBody.innerHTML = '<tr><td colspan="3">No buses assigned</td></tr>';
          }

          updateDateTime();
        } else {
          tableBody.innerHTML = '<tr><td colspan="3">No buses assigned</td></tr>';
        }
      }).catch((error) => {
        console.error('Error getting data:', error);
        tableBody.innerHTML = '<tr><td colspan="3">Error loading data</td></tr>';
      });
    }

    function refreshTable() {
      populateTable();
      setTimeout(refreshTable, 3 * 60 * 1000);
    }

    function updateDateTime() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: 'numeric', hour12: true };
      document.getElementById('datetime').textContent = `Last Refreshed: ${now.toLocaleString('en-US', options)}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      populateTable();
      refreshTable();
    });
  </script>
</body>
</html>
