<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User - Bus Assignments Table</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      transform: scale(0.8);
      transform-origin: top left;
      width: 125%;
    }

    table {
      table-layout: fixed;
      width: 100%;
    }
    th, td {
      word-wrap: break-word;
      text-align: center;
      font-size: 25px;
      font-weight: bold;
      padding: 0px;
      line-height: 1;
      height: 25px;
    }
    th {
      background-color: #007bff;
      color: white;
    }
    /* Alternate row colors */
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    
    .red-text {
      color: red;
    }

    .header-container {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      width: 100%;
    }

    .header-container h2 {
      margin: 0;
      font-size: 30px;
      font-weight: bold;
    }

    .header-container #datetime {
      margin: 0;
      font-size: 30px;
      font-weight: bold;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <img src="https://kingstransit.github.io/bus-assignments/header-logo-120.png" alt="Company Logo" style="position: absolute; top: 10px; left: 20px; width: 150px; height: auto;">

  <div class="container mt-5">
    <div class="header-container">
      <h2 class="text-center">Bus Assignments</h2>
      <div id="datetime"></div>
    </div>

    <div id="userContent">
      <table class="table table-bordered table-responsive-sm mt-3">
        <thead>
          <tr>
            <th>Bus#</th>
            <th>Assigned Route</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- Table rows populated dynamically -->
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-database.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCaouI0BOGsEEGK8RleByMEeLoRsvu2nLw",
      authDomain: "busassignments-6d239.firebaseapp.com",
      databaseURL: "https://busassignments-6d239-default-rtdb.firebaseio.com",
      projectId: "busassignments-6d239",
      storageBucket: "busassignments-6d239.appspot.com",
      messagingSenderId: "451720299964",
      appId: "1:451720299964:web:34637403021a3dc9a5d7b9",
      measurementId: "G-4J3KXJD2BC"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);

    function populateTable() {
      const tableBody = document.getElementById('table-body');
      const dbRef = ref(db, 'busAssignments');

      get(dbRef).then((snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          tableBody.innerHTML = '';

          // Convert object to array if necessary
          const entries = Array.isArray(data) ? data : Object.values(data);

          entries.forEach((rowData) => {
            // ✅ Skip rows with no bus assigned
            if (!rowData.col1 || rowData.col1.trim() === "") return;

            // ✅ Skip rows with no assigned route
            if (!rowData.col2 || rowData.col2.trim() === "") return;

            // Optional: skip buses that aren’t commissioned yet
            const futureBuses = ["75-NOVA","76-NOVA","77-NOVA","79-NOVA"];
            if (futureBuses.includes(rowData.col1)) return;

            const newRow = document.createElement('tr');

            // Highlight out-of-service buses
            if (rowData.col2 === 'OOS') {
              newRow.classList.add('red-text');
            }

            newRow.innerHTML = `
              <td>${rowData.col1}</td>
              <td>${rowData.col2}</td>
              <td>${rowData.col3 || ""}</td>
            `;

            tableBody.appendChild(newRow);
          });

          updateDateTime();

          // Show message if no rows were added
          if (!tableBody.hasChildNodes()) {
            tableBody.innerHTML = '<tr><td colspan="3">No buses assigned</td></tr>';
          }

        } else {
          console.log('No data available');
          tableBody.innerHTML = '<tr><td colspan="3">No buses assigned</td></tr>';
        }
      }).catch((error) => {
        console.error('Error getting data:', error);
        tableBody.innerHTML = '<tr><td colspan="3">Error loading data</td></tr>';
      });
    }

    function refreshTable() {
      populateTable();
      setTimeout(refreshTable, 3 * 60 * 1000); // Refresh every 3 minutes
    }

    function updateDateTime() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: 'numeric', hour12: true };
      const formattedDateTime = now.toLocaleString('en-US', options);
      document.getElementById('datetime').textContent = `Last Refreshed: ${formattedDateTime}`;
    }

    document.addEventListener('DOMContentLoaded', function() {
      populateTable();
      refreshTable();
    });
  </script>
</body>
</html>
</body>
</html>
